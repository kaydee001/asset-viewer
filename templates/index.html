<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Asset Viewer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="light">
    <div id="drop-zone"></div>

    <div id="left-panel">
        <div id="stats-panel">drop a .glb file to begin</div>
    </div>

    <div id="right-panel">
        <div class="panel-section">
            <div class="section-title">camera</div>
            <button id="auto-rotate-btn"> - auto rotate [off]</button>
            <button id="pan-btn"> - pan [off]</button>
        </div>

        <div class="panel-section">
            <div class="section-title">viewport</div>        
            <button id="wireframe-btn"> - wireframe [off]</button>
            <button id="grid-btn"> - grid [on]</button>
            <button id="theme-btn"> - theme [light]</button>
        </div>
        <div class="panel-section">
            <button id="reset-btn">reset</button>
        </div>
    </div>    

    <script type="module" src="{{ url_for('static', filename='viewer.js') }}"></script>
</body>
</html>

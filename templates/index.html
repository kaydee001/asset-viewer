<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Asset Viewer</title>
    <style>
        body 
        {
            background: #e8e8e8;
            background: radial-gradient(circle,rgba(232, 232, 232, 1) 0%, rgba(96, 96, 96, 1) 100%);
        }
    </style>
</head>
<body>
    <!-- Three.js core -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- GLTFLoader for loading glb files -->

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/RGBELoader.js"></script>
    
    <div id="stats-panel" style="position: fixed; top: 10px; left: 10px; color: white;">loading</div>
    <div id="drop-zone"></div>

    <script src="{{ url_for('static', filename='viewer.js') }}"></script>

</html>
